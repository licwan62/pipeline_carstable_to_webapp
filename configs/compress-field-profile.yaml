# 压缩脚本读取哪些工作表。名称必须与输入 Excel 完全一致。
input:
  sheets:
    - ALL尺码匹配
    - TM尺码匹配
    - HNT尺码匹配

# 标准字段: [允许出现的 Excel 列名，按优先级从上到下匹配]
# 只有输入表的列名变化时才需要修改这里。
columns:
  品牌:
    - MAKE
    - 品牌
  前台车型:
    - MODEL
    - 前台车型
  结构:
    - 结构
  版本:
    - 版本
  年份区间:
    - YEAR
    - 年份区间
  最终尺码:
    - 确认尺码
    - 自动尺码
    - 最终尺码
    - 对应尺码
  驾驶室类型:
    - CAB
    - 驾驶室类型
  货斗长度_ft:
    - BED
    - 货斗长度_ft
  子车系:
    - SUB-MODEL
    - 子车系
  分类:
    - 分类

# 输入缺少可选字段时使用的默认值。
defaults:
  分类: ""

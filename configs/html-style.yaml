# HTML 公共视觉样式。两种数据配置通过 extends 引用本文件。

# 分页与画布
profile_page_mode: new-page
page_width_px: 2000
page_height_px: 1800
chart_columns: 5
page_padding_px: 0
column_gap: 10px
page_bottom_safe_margin_px: 0
non_pickup_page_bottom_safe_margin_px: 39
pickup_page_bottom_safe_margin_px: 84
max_rows: 0
min_rows_per_brand_chunk: 2

# 行高与区块尺寸
line_height: 1
table_row_height_px: 30
brand_height_px: 50
pickup_brand_height_px: 60px
make_padding_y: 5px
header_height_px: 30
brand_block_gap_px: 10
brand_block_padding: 0

# 颜色（十六进制颜色必须加引号，否则 # 会被 YAML 当作注释）
page_background: "#ffffff"
page_text: "#111111"
make_background: "#1a77bb"
make_text: "#ffffff"
table_background: "#ffffff"
row_stripe_light: "#f5f5f5"
row_stripe_dark: "#e2e1df"
header_background: "#33363a"
header_text: "#f1f1f1"
pickup_make_background: "#d57b32"
pickup_make_text: "#ffffff"
table_border_color: "#ffffff"
table_outline_color: rgba(0, 0, 0, 0.1)
description_text: "#ffffff"
pickup_description_text: "#ffffff"

# 表格边框与单元格
table_border_width: 2px
table_outline_width: 0px
table_radius: 10px
cell_padding_x: 5px
size_cell_padding_x: 2px
model_align: left
year_align: center
type_align: left
cab_align: center
bed_align: center
size_align: center

# 列宽
nonpick_model_col_width: 27%
nonpick_year_col_width: 25%
nonpick_type_col_width: 33%
nonpick_size_col_width: 15%
pick_year_col_width: 25%
pick_cab_col_width: 40%
pick_bed_col_width: 20%
pick_size_col_width: 15%

# 字体
base_font_family: D-DIN-PRO, sans-serif
make_font_family: D-DIN-PRO, Helvetica, sans-serif
make_font_size: 30px
make_font_weight: 700
brand_padding_x: 10px
brand_title_transform: uppercase
description_font_family: D-DIN-PRO, Helvetica, sans-serif
description_font_size: 12px
description_font_weight: 400
description_margin_top: 2px
description_text_transform: none
brand_part_font_size: 18px
header_font_family: D-DIN-PRO, Helvetica, sans-serif
header_font_size: 20px
header_font_weight: 600
header_padding_y: 1px
header_padding_x: 5px
header_text_transform: uppercase
cell_font_family: D-DIN-PRO, Helvetica, sans-serif
cell_font_size: 18px
cell_font_weight: 400
cell_line_height: 1.25
badge_font_family: D-DIN-PRO, Helvetica, sans-serif
badge_font_size: 20px
badge_font_weight: 700
badge_letter_spacing: 1.5px
fit_text_min_font_size: 7px

# 品牌标题与 Logo
brand_logo_enabled: true
brand_logo_dir: img_logos
brand_logo_opacity: 0.8
brand_logo_width: 46px
brand_logo_height: 32px
brand_logo_right: 10px
brand_part_align: center
brand_title_align: left
header_align: center
model_header_align: left
type_header_align: center

# 皮卡标题
pickup_make_font_family: D-DIN-PRO, Helvetica, sans-serif
pickup_brand_title_align: left
pickup_description_font_family: D-DIN-PRO, Helvetica, sans-serif
pickup_description_font_size: 30px
pickup_description_font_weight: 400
pickup_description_margin_top: 5px

# 尺码徽章
size_badge_width: 100%
size_badge_min_width: 0
size_badge_height: 100%
size_badge_min_height: 18px
size_badge_padding_y: 0
size_badge_padding_x: 0
size_badge_radius: 3px
size_badge_background: "#6b7280"
size_badge_text_color: "#ffffff"
size_badge_shadow: inset 0 0 0 rgba(48, 48, 48, 0.2)
size_a_background: "#1777c8"
size_c_background: "#d62828"
size_h_background: "#00a6a6"
size_s_background: "#f28c28"
size_other_background: "#6b7280"
pickup_size_badge_padding_x: 0

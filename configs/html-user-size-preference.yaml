# This profile reads TSVs generated by the inplace_table step.
# Important display fields:
# - non-pickup MODEL column uses SHORT-MODEL, falling back to MODEL
# - non-pickup TYPE column uses TYPE from the user-size export
# - pickup title uses TITLE
# - pickup CAB column uses SHORT-CAB, falling back to CAB
# - SIZE is the user-facing size column

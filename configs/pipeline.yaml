# 日常维护只需要看这个文件。
# 具体命令和产物校验在 pipeline-steps.yaml；除非调整程序结构，否则不用修改它。
include: pipeline-steps.yaml

# 相邻项目的位置（相对于本项目根目录）
repos:
  pipeline: "."
  compress: "../compress_to_size_chart"
  html: "../generate_size_chart_html"
  publish: "../publish_tables_to_webapp"

# 工作区目录
paths:
  input_dir: "data/input"
  middle_dir: "data/middle"
  output_dir: "data/output"
  logs_dir: "logs"

# 输入文件
file_rules:
  input_pattern: "*.xlsx"

# 增量模式使用的字段映射
incremental:
  field_profile: "configs/compress-field-profile.yaml"

# 用户尺码 Excel 模板
variables:
  user_size_template: "{root}/data/template/尺码适配表.xlsx"
  user_size_non_pickup_table_name: "非皮卡高度压缩表"
  user_size_pickup_table_name: "皮卡高度压缩表"

# 任一步失败后是否立即停止
run:
  stop_on_error: true

# 可单独关闭某一步；一般保持全部为 true。
# 命令行的 --from-step/--to-step 仍可临时选择执行范围。
steps:
  compress:
    enabled: true
  atom_validate:
    enabled: true
  user_size_template:
    enabled: true
  user_size_validate:
    enabled: true
  inplace_table:
    enabled: true
  get_html:
    enabled: true
  publish:
    enabled: true
